name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build macOS app
        run: |
          cd macos
          xcodebuild -project TypeFlow.xcodeproj \
            -scheme TypeFlow \
            -configuration Release \
            -derivedDataPath build/derived \
            ONLY_ACTIVE_ARCH=NO \
            clean build || echo "Build failed - check Xcode project configuration"

      - name: Create DMG
        run: |
          cd macos
          APP_PATH=$(find build/derived -name "TypeFlow.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found, skipping DMG creation"
            exit 0
          fi
          mkdir -p build/dmg
          cp -R "$APP_PATH" build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "TypeFlow" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            build/TypeFlow-1.0.0.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TypeFlow-macOS
          path: macos/build/TypeFlow-1.0.0.dmg
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Windows EXE
        shell: pwsh
        run: |
          cd windows
          dotnet restore
          dotnet publish -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true
          New-Item -ItemType Directory -Force -Path dist
          Get-ChildItem -Recurse -Filter "TypeFlow.exe" | Copy-Item -Destination dist/TypeFlow-1.0.0-Setup.exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TypeFlow-Windows
          path: windows/dist/TypeFlow-1.0.0-Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libgirepository1.0-dev \
            gir1.2-gtk-4.0 libadwaita-1-dev gir1.2-adw-1 \
            python3-gi python3-gi-cairo || true

      - name: Download appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          cd /tmp && ./appimagetool --appimage-extract 2>/dev/null || true

      - name: Build AppImage
        run: |
          cd linux
          
          # Create AppDir structure
          APP_DIR="$(pwd)/AppDir"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/usr/bin"
          mkdir -p "$APP_DIR/usr/lib/python3/typeflow"
          mkdir -p "$APP_DIR/usr/share/applications"
          mkdir -p "$APP_DIR/usr/share/icons/hicolor/scalable/apps"
          mkdir -p "$APP_DIR/usr/share/metainfo"
          
          # Copy Python source
          cp typeflow/*.py "$APP_DIR/usr/lib/python3/typeflow/"
          
          # Install Python dependencies
          pip install --target="$APP_DIR/usr/lib/python3" pynput
          
          # Create AppRun
          cat > "$APP_DIR/AppRun" << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PYTHONPATH="${HERE}/usr/lib/python3:${PYTHONPATH}"
          export PATH="${HERE}/usr/bin:${PATH}"
          exec python3 -m typeflow "$@"
          APPRUN
          chmod +x "$APP_DIR/AppRun"
          
          # Create launcher
          cat > "$APP_DIR/usr/bin/typeflow" << 'LAUNCHER'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          APPDIR="$(dirname "$(dirname "$HERE")")"
          export PYTHONPATH="${APPDIR}/usr/lib/python3:${PYTHONPATH}"
          exec python3 -m typeflow "$@"
          LAUNCHER
          chmod +x "$APP_DIR/usr/bin/typeflow"
          
          # Copy desktop file and icon
          cp data/com.typeflow.app.desktop "$APP_DIR/"
          cp data/com.typeflow.app.desktop "$APP_DIR/usr/share/applications/"
          cp data/icons/com.typeflow.app.svg "$APP_DIR/"
          cp data/icons/com.typeflow.app.svg "$APP_DIR/usr/share/icons/hicolor/scalable/apps/"
          cp data/com.typeflow.app.metainfo.xml "$APP_DIR/usr/share/metainfo/"
          
          # Build AppImage
          ARCH=x86_64 /tmp/squashfs-root/AppRun "$APP_DIR" "TypeFlow-1.0.0-x86_64.AppImage" || \
          ARCH=x86_64 /tmp/appimagetool "$APP_DIR" "TypeFlow-1.0.0-x86_64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: TypeFlow-Linux
          path: linux/TypeFlow-*.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f -name "TypeFlow*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TypeFlow ${{ github.ref_name }}
          body: |
            ## TypeFlow ${{ github.ref_name }}
            
            **Type naturally. Anywhere.**
            
            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS | `TypeFlow-1.0.0.dmg` |
            | Windows | `TypeFlow-1.0.0-Setup.exe` |
            | Linux | `TypeFlow-1.0.0-x86_64.AppImage` |
          files: |
            TypeFlow-macOS/*
            TypeFlow-Windows/*
            TypeFlow-Linux/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
