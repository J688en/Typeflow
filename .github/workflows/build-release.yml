name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build macOS app
        run: |
          cd macos
          xcodebuild -project TypeFlow.xcodeproj \
            -scheme TypeFlow \
            -configuration Release \
            -derivedDataPath build/derived \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Create DMG
        run: |
          cd macos
          APP_PATH=$(find build/derived -name "TypeFlow.app" -type d | head -1)
          mkdir -p build/dmg
          cp -R "$APP_PATH" build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "TypeFlow" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            build/TypeFlow-1.0.0.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TypeFlow-macOS
          path: macos/build/TypeFlow-1.0.0.dmg

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Windows EXE
        run: |
          cd windows
          dotnet publish -c Release -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -p:EnableWindowsTargeting=true
          mkdir -p dist
          cp bin/Release/net8.0-windows/win-x64/publish/TypeFlow.exe dist/TypeFlow-1.0.0-Setup.exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TypeFlow-Windows
          path: windows/dist/TypeFlow-1.0.0-Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Build AppImage
        run: |
          cd linux
          chmod +x build-appimage.sh
          ./build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: TypeFlow-Linux
          path: linux/TypeFlow-*.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TypeFlow ${{ github.ref_name }}
          body: |
            ## TypeFlow ${{ github.ref_name }}

            **Type naturally. Anywhere.**

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS | `TypeFlow-1.0.0.dmg` |
            | Windows | `TypeFlow-1.0.0-Setup.exe` |
            | Linux | `TypeFlow-1.0.0-x86_64.AppImage` |

            ### What's included
            - Natural typing simulation (30-120 WPM)
            - Subtle typo simulation with auto-correction
            - Countdown timer or global hotkey trigger
            - Native UI for each platform
          files: |
            TypeFlow-macOS/TypeFlow-1.0.0.dmg
            TypeFlow-Windows/TypeFlow-1.0.0-Setup.exe
            TypeFlow-Linux/TypeFlow-*.AppImage
          draft: false
          prerelease: false

  deploy-website:
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: website/downloads

      - name: Flatten downloads
        run: |
          cd website/downloads
          find . -mindepth 2 -type f -exec mv {} . \;
          find . -mindepth 1 -type d -exec rmdir {} + 2>/dev/null || true
          ls -la

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website
